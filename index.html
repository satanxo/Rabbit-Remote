<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit Remote Trigger</title>
    <!-- Library for generating the JWT token needed for Firebase v1 API -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
    <style>
        :root {
            --primary: #bb86fc;
            --secondary: #03dac6;
            --background: #121212;
            --surface: #1e1e1e;
            --error: #cf6679;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .card {
            background-color: var(--surface);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { 
            margin-top: 0; 
            color: var(--primary); 
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .alert-btn {
            background: linear-gradient(135deg, #cf6679, #b00020);
            color: white;
            border: none;
            border-radius: 50%;
            width: 160px;
            height: 160px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(207, 102, 121, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            text-transform: uppercase;
            outline: none;
        }
        
        .alert-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(207, 102, 121, 0.6);
        }

        .alert-btn:active {
            transform: scale(0.92);
        }

        .status-container {
            margin-top: 24px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .status { 
            font-size: 14px; 
            font-weight: 600;
            color: var(--text-dim); 
            transition: all 0.3s;
        }
        
        .success { color: var(--secondary); text-shadow: 0 0 10px rgba(3, 218, 198, 0.3); }
        .error { color: var(--error); }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(187, 134, 252, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading .spinner { display: block; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1>🐰 Rabbit Remote</h1>
        <p>Broadcast a signal to all your devices</p>

        <div style="margin-bottom: 20px;">
            <input type="text" id="customMessage" placeholder="Enter custom message (optional)..." 
                   style="width: 80%; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #2c2c2c; color: white; text-align: center;">
        </div>
        
        <div style="display: flex; justify-content: center;">
            <button class="alert-btn" onclick="triggerAlarm()">
                <span>🚨</span>
                <span style="margin-top: 8px;">Trigger<br>Alarm</span>
            </button>
        </div>

        <div class="status-container" id="statusContainer">
            <div class="spinner"></div>
            <div id="statusText" class="status">Ready to signal</div>
        </div>
    </div>

    <script>
        // ... (config part remains the same)
        const MY_SERVICE_ACCOUNT_JSON = `{

  "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/firebase-adminsdk-fbsvc%40rabbit-app-84b67.iam.gserviceaccount.com",
  "universe_domain": "googleapis.com"

        async function getAccessToken(serviceAccount) {
            const header = { alg: "RS256", typ: "JWT" };
            const now = Math.floor(Date.now() / 1000);
            const claim = {
                iss: serviceAccount.client_email,
                scope: "https://www.googleapis.com/auth/firebase.messaging https://www.googleapis.com/auth/datastore",
                aud: "https://oauth2.googleapis.com/token",
                exp: now + 3600,
                iat: now
            };

            const sHeader = JSON.stringify(header);
            const sClaim = JSON.stringify(claim);
            const sPayload = KJUR.jws.JWS.sign(null, sHeader, sClaim, serviceAccount.private_key);

            const response = await fetch("https://oauth2.googleapis.com/token", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=" + sPayload
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error_description || "Auth failed");
            return data.access_token;
        }

        async function triggerAlarm() {
            const statusEl = document.getElementById('statusText');
            const containerEl = document.getElementById('statusContainer');
            const msgInput = document.getElementById('customMessage');
            const customMsg = msgInput.value.trim() || "Remote Alarm Triggered!";

            containerEl.className = "status-container loading";
            statusEl.className = "status";
            statusEl.innerText = "Connecting to Rabbit...";

            try {
                const serviceAccount = JSON.parse(MY_SERVICE_ACCOUNT_JSON);
                const projectId = serviceAccount.project_id;
                
                // 1. Authenticate
                const accessToken = await getAccessToken(serviceAccount);
                
                // 2. Send the Alarm Signal to the GLOBAL TOPIC
                statusEl.innerText = "Broadcasting to all devices...";

                const payload = {
                    message: {
                        topic: "global_alarms",
                        data: {
                            action: "TRIGGER_ALARM",
                            title: customMsg
                        },
                        android: { 
                            priority: "high",
                            ttl: "0s"
                        }
                    }
                };

                const response = await fetch(`https://fcm.googleapis.com/v1/projects/${projectId}/messages:send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                containerEl.className = "status-container";
                if (response.ok) {
                    statusEl.className = "status success";
                    statusEl.innerText = "✅ ALARM TRIGGERED";
                    
                    // Reset after 3 seconds
                    setTimeout(() => {
                        statusEl.className = "status";
                        statusEl.innerText = "Ready to signal";
                    }, 3000);
                } else {
                    throw new Error(result.error?.message || "Signal failed");
                }
            } catch (error) {
                containerEl.className = "status-container";
                statusEl.className = "status error";
                statusEl.innerText = "❌ " + error.message;
            }
        }
    </script>

</html>
